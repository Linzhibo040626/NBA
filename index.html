<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 实时数据 - 赛程·球员·排名</title>
    <meta name="description" content="实时查看NBA今日赛程、比赛战绩、球员数据和球队排名">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-left">
            <h1 class="logo">🏀 NBA <span>实时数据</span></h1>
        </div>
        <div class="header-right">
            <span class="live-badge" id="liveBadge">🟢 直播</span>
            <span class="header-date" id="headerDate"></span>
        </div>
    </div>
    <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="games">
            <span class="tab-icon">📋</span>
            <span class="tab-label">今日赛程</span>
        </button>
        <button class="tab-btn" data-tab="players">
            <span class="tab-icon">👤</span>
            <span class="tab-label">球员数据</span>
        </button>
        <button class="tab-btn" data-tab="standings">
            <span class="tab-icon">🏆</span>
            <span class="tab-label">球队排名</span>
        </button>
    </nav>
</header>

<main>
    <!-- ===== 今日赛程 ===== -->
    <section id="tab-games" class="tab-content active">
        <div class="date-nav">
            <button class="date-nav-btn" id="prevDateBtn">‹ 前一天</button>
            <div class="date-display">
                <span id="displayDate"></span>
            </div>
            <button class="date-nav-btn" id="nextDateBtn">后一天 ›</button>
            <button class="date-nav-btn today-btn" id="todayBtn">今天</button>
        </div>
        <div id="gamesContainer" class="games-container">
            <div class="loading-state"><div class="spinner"></div><p>正在加载赛程数据...</p></div>
        </div>
    </section>

    <!-- ===== 球员数据 ===== -->
    <section id="tab-players" class="tab-content">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="playerSearchInput" placeholder="输入球员姓名（支持中英文）..." autocomplete="off">
                <button id="searchBtn" class="search-btn">搜索</button>
            </div>
            <div class="search-hints">
                <span>热门：</span>
                <button class="hot-tag" data-player="LeBron James">詹姆斯</button>
                <button class="hot-tag" data-player="Stephen Curry">库里</button>
                <button class="hot-tag" data-player="Kevin Durant">杜兰特</button>
                <button class="hot-tag" data-player="Giannis Antetokounmpo">字母哥</button>
                <button class="hot-tag" data-player="Luka Doncic">东契奇</button>
                <button class="hot-tag" data-player="Jayson Tatum">塔图姆</button>
            </div>
        </div>
        <div id="playerResults" class="player-results"></div>
        <div id="playerStatsContainer" class="player-stats-container"></div>
    </section>

    <!-- ===== 球队排名 ===== -->
    <section id="tab-standings" class="tab-content">
        <div class="standings-header">
            <h2>2025-26 赛季球队排名</h2>
            <p class="standings-subtitle">数据来源: balldontlie.io</p>
        </div>
        <div id="standingsContainer" class="standings-container">
            <div class="loading-state"><div class="spinner"></div><p>正在加载排名数据...</p></div>
        </div>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <p>数据来源: <a href="https://balldontlie.io" target="_blank" rel="noopener">balldontlie.io</a> | 仅供学习参考</p>
        <p class="footer-version">v1.0 · 部署于 Cloudflare Pages</p>
    </div>
</footer>

<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner large"></div>
    <p>加载中...</p>
</div>

<script src="js/app.js"></script>
</body>
</html>
