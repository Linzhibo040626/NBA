<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 篮球视界 - 实时赛程·球员数据·球队排名</title>
    <meta name="description" content="NBA 中文实时数据平台，今日赛程、球员统计、球队排名一站式查看">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 顶部导航 ===== -->
<header id="header">
    <div class="header-bg"></div>
    <div class="header-inner">
        <div class="logo-section">
            <div class="logo-icon">🏀</div>
            <div class="logo-text">
                <h1>NBA 篮球视界</h1>
                <span class="logo-sub">实时数据平台</span>
            </div>
        </div>
        <div class="header-info">
            <span class="live-indicator" id="liveIndicator">● 直播中</span>
            <span class="header-date" id="headerDate"></span>
        </div>
    </div>
    <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="games">
            <span class="tab-icon">📋</span>
            <span>今日赛程</span>
        </button>
        <button class="tab-btn" data-tab="players">
            <span class="tab-icon">⭐</span>
            <span>球员数据</span>
        </button>
        <button class="tab-btn" data-tab="standings">
            <span class="tab-icon">🏆</span>
            <span>球队排名</span>
        </button>
    </nav>
</header>

<main>

<!-- ===== 新闻头条 ===== -->
<section id="newsSection" class="news-section">
    <div class="section-header">
        <span class="section-icon">📰</span>
        <h2>NBA 头条</h2>
    </div>
    <div class="news-scroll" id="newsScroll">
        <div class="loading-state-sm"><div class="spinner-sm"></div></div>
    </div>
</section>

<!-- ===== 今日赛程 ===== -->
<section id="tab-games" class="tab-content active">
    <div class="section-header">
        <span class="section-icon">📋</span>
        <h2>今日赛程</h2>
        <div class="date-nav">
            <button class="date-btn" id="prevDateBtn">‹</button>
            <span class="date-display" id="displayDate"></span>
            <button class="date-btn" id="nextDateBtn">›</button>
            <button class="date-btn today-btn" id="todayBtn">今天</button>
        </div>
    </div>
    <div id="gamesContainer" class="games-container">
        <div class="loading-state"><div class="spinner"></div><p>正在加载赛程数据...</p></div>
    </div>
</section>

<!-- ===== 球员数据 ===== -->
<section id="tab-players" class="tab-content">
    <div class="section-header">
        <span class="section-icon">⭐</span>
        <h2>赛季数据领跑者</h2>
        <span class="section-badge">2025-26 赛季</span>
    </div>
    <div class="leaderboard-tabs" id="leaderboardTabs">
        <button class="lb-tab active" data-cat="pts">得分</button>
        <button class="lb-tab" data-cat="reb">篮板</button>
        <button class="lb-tab" data-cat="ast">助攻</button>
        <button class="lb-tab" data-cat="stl">抢断</button>
        <button class="lb-tab" data-cat="blk">盖帽</button>
    </div>
    <div id="leaderboardContainer" class="leaderboard-container">
        <div class="loading-state"><div class="spinner"></div><p>加载球员数据...</p></div>
    </div>
</section>

<!-- ===== 球队排名 ===== -->
<section id="tab-standings" class="tab-content">
    <div class="section-header">
        <span class="section-icon">🏆</span>
        <h2>球队排名</h2>
        <span class="section-badge">2025-26 赛季</span>
    </div>
    <div id="standingsContainer" class="standings-container">
        <div class="loading-state"><div class="spinner"></div><p>正在加载排名数据...</p></div>
    </div>
</section>

</main>

<!-- ===== 页脚 ===== -->
<footer>
    <div class="footer-inner">
        <div class="footer-logos">
            <span class="footer-nba-logo">🏀</span>
            <span class="footer-brand">NBA 篮球视界</span>
        </div>
        <p class="footer-desc">数据来源: <a href="https://www.espn.com/nba/" target="_blank" rel="noopener">ESPN</a> · 仅供学习参考</p>
        <p class="footer-ver">v2.0 · 部署于 Cloudflare Pages</p>
    </div>
</footer>

<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner lg"></div>
    <p>加载中...</p>
</div>

<script src="js/app.js"></script>
</body>
</html>
